<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediCare - Patient Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="logo">MediCare</div>
    <div class="nav-links">Admin Panel</div>
</nav>

<div class="main-wrapper">
    <div class="appointment-container">
        <div id="alertBox"></div>

        <h2 id="formTitle">Patient Registration</h2>
        
        <form id="appointmentForm" class="appointment-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter name" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" placeholder="Age" required>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Blood Group</label>
                <select id="bloodGroup">
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" placeholder="Phone number" required>
            </div>
            <div class="form-group full-width">
                <label>Patient Address</label>
                <input type="text" id="address" placeholder="Flat, Street, City, State" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select id="department">
                    <option>General Medicine</option>
                    <option>Cardiology</option>
                    <option>Neurology</option>
                    <option>Pediatrics</option>
                </select>
            </div>
            <div class="form-group">
                <label>Doctor</label>
                <select id="doctor">
                    <option>Dr. Ahmed Khan</option>
                    <option>Dr. Sarah Ali</option>
                    <option>Dr. Rahul Sharma</option>
                </select>
            </div>
            <div class="form-group">
                <label>Time Slot</label>
                <select id="time">
                    <option>10:00 AM</option>
                    <option>12:00 PM</option>
                    <option>02:00 PM</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>Medical Notes</label>
                <textarea id="message" rows="2" placeholder="Describe symptoms..."></textarea>
            </div>
            <button type="submit" class="book-btn" id="submitBtn">Save Patient Record</button>
        </form>

        <hr class="line">

        <div class="list-section">
            <h3>Recent Records</h3>
            <input type="text" id="searchInput" placeholder="🔍 Search name, phone or blood group...">
            <div id="recordsContainer"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
